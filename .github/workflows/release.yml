name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history and tags so the Go toolchain stamps the exact
          # tag as the module version in the binaries (Go >= 1.24).
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - run: go vet ./...
      - run: go test ./...
      - name: Cross-compile static binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${GITHUB_REF_NAME}"
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            goos="${target%/*}" goarch="${target#*/}"
            ext=""; [ "$goos" = windows ] && ext=".exe"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags '-s -w' \
              -o "dist/git-snapshot-${version}-${goos}-${goarch}${ext}" ./cmd/git-snapshot
          done
      - name: Verify embedded version
        run: |
          set -euo pipefail
          out="$(./dist/git-snapshot-${GITHUB_REF_NAME}-linux-amd64 --version)"
          echo "$out"
          [ "$out" = "git-snapshot ${GITHUB_REF_NAME}" ]
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" --generate-notes
      - name: Trigger Go module proxy indexing
        run: |
          curl -fsS "https://proxy.golang.org/github.com/markosnarinian/git-snapshot/@v/${GITHUB_REF_NAME}.info"
