name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Windows runners default to core.autocrlf=true, which rewrites line
      # endings on checkout/restore and breaks byte-exact test assertions.
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false # no go.sum (zero dependencies)
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...
